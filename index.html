<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Painel Vital EPC13</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#081224;
  color:white;
  font-family:Arial,sans-serif;
}

header{
  background:#020617;
  border-bottom:1px solid #1e293b;
  padding:18px 22px;

  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:12px;
}

h1{
  margin:0;
  font-size:28px;
}

.sub{
  margin-top:6px;
  color:#94a3b8;
  font-size:14px;
}

button{
  border:none;
  background:#2563eb;
  color:white;
  padding:11px 16px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}

button.off{
  background:#334155;
}

.container{
  padding:18px;
  max-width:1900px;
  margin:auto;
}

.summary{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:12px;
  margin-bottom:18px;
}

.summary-card{
  background:#162235;
  border:1px solid #2d3d55;
  border-radius:16px;
  padding:15px;
}

.summary-label{
  color:#8da2c0;
  font-size:12px;
}

.summary-value{
  font-size:34px;
  font-weight:bold;
  margin-top:5px;
}

.ok{
  color:#22c55e;
}

.warn{
  color:#facc15;
}

.bad{
  color:#ef4444;
}

.blue{
  color:#38bdf8;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:16px;
}

.card{
  position:relative;

  background:#122033;

  border-radius:20px;
  border:2px solid #2d3d55;

  padding:16px;

  transition:0.2s;
}

.card.normal{
  border-color:#1f9d55;
}

.card.warning{
  border-color:#d9a404;
}

.card.risk{
  border-color:#ef4444;
  background:#2a1010;

  animation:pulse 1s infinite;
}

@keyframes pulse{

  0%{
    box-shadow:0 0 0 rgba(239,68,68,0.1);
  }

  50%{
    box-shadow:0 0 26px rgba(239,68,68,0.8);
  }

  100%{
    box-shadow:0 0 0 rgba(239,68,68,0.1);
  }
}

.card-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
}

.worker{
  font-size:20px;
  font-weight:bold;
}

.meta{
  margin-top:5px;
  color:#94a3b8;
  font-size:12px;
}

.status-big{
  font-size:14px;
  font-weight:bold;
  padding:8px 12px;
  border-radius:12px;
}

.status-big.normal{
  background:#12351f;
  color:#22c55e;
}

.status-big.warning{
  background:#3f3207;
  color:#facc15;
}

.status-big.risk{
  background:#5a1111;
  color:#ef4444;
}

.vital{
  margin-top:18px;

  display:flex;
  justify-content:space-between;
  align-items:center;
}

.bpm{
  font-size:72px;
  font-weight:bold;
  line-height:1;
}

.bpm.normal{
  color:#22c55e;
}

.bpm.warning{
  color:#facc15;
}

.bpm.risk{
  color:#ef4444;
}

.bpm-label{
  margin-top:4px;
  color:#94a3b8;
  font-size:12px;
}

.chart{
  width:110px;
  height:50px;

  background:#081224;

  border-radius:12px;

  padding:4px;
}

.section-title{
  margin-top:18px;
  margin-bottom:10px;

  color:#94a3b8;
  font-size:12px;
  letter-spacing:1px;
}

.metrics{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.metric{
  background:#081224;
  border-radius:14px;
  padding:10px;
}

.metric-label{
  font-size:11px;
  color:#8da2c0;
}

.metric-value{
  margin-top:5px;
  font-size:16px;
  font-weight:bold;
}

.alert-bar{
  margin-top:16px;

  padding:12px;

  border-radius:14px;

  font-weight:bold;
  text-align:center;
}

.alert-bar.normal{
  background:#12351f;
  color:#22c55e;
}

.alert-bar.warning{
  background:#3f3207;
  color:#facc15;
}

.alert-bar.risk{
  background:#5a1111;
  color:#ef4444;
}

.footer{
  margin-top:18px;
  color:#64748b;
  font-size:13px;
}

.empty{
  border:1px dashed #334155;
  border-radius:22px;

  padding:60px;

  text-align:center;
  color:#94a3b8;
}

</style>
</head>

<body>

<header>

  <div>
    <h1>Painel Vital EPC13</h1>

    <div class="sub">
      Monitoramento fisiológico em tempo real · espaço confinado
    </div>
  </div>

  <button id="soundBtn" onclick="toggleSound()">
    🔇 Alertas desligados
  </button>

</header>

<div class="container">

  <div class="summary">

    <div class="summary-card">
      <div class="summary-label">Ativos</div>
      <div class="summary-value" id="sumActive">0</div>
    </div>

    <div class="summary-card">
      <div class="summary-label">Normal</div>
      <div class="summary-value ok" id="sumNormal">0</div>
    </div>

    <div class="summary-card">
      <div class="summary-label">Monitorar</div>
      <div class="summary-value warn" id="sumWarning">0</div>
    </div>

    <div class="summary-card">
      <div class="summary-label">Risco</div>
      <div class="summary-value bad" id="sumRisk">0</div>
    </div>

  </div>

  <div id="cards" class="grid"></div>

  <div class="footer">
    Status: <span id="status">iniciando...</span>
  </div>

</div>

<script>

const SUPABASE_URL =
"https://kxvbgpvdjbgbhbovnpyy.supabase.co";

const SUPABASE_KEY =
"sb_publishable_yg8SSqYLolo0oWx_WZqsFA_5P4TBiAg";

const supabaseClient =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

let sessions = {};

let rrBuffers = {};
let bpmBuffers = {};

let lastRR = {};
let lastMovement = {};

let soundEnabled = false;
let lastAlarm = 0;

const MAX_RR = 60;
const MAX_BPM = 30;

// =======================
// AUDIO
// =======================

function toggleSound(){

  soundEnabled = !soundEnabled;

  const btn =
  document.getElementById("soundBtn");

  btn.innerText = soundEnabled
    ? "🔊 Alertas ligados"
    : "🔇 Alertas desligados";

  btn.className = soundEnabled
    ? ""
    : "off";

  if(soundEnabled){
    beep(0.05);
  }
}

function beep(volume=0.25){

  if(!soundEnabled) return;

  try{

    const ctx =
    new (window.AudioContext ||
    window.webkitAudioContext)();

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "sine";
    osc.frequency.value = 850;

    gain.gain.value = volume;

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();

    setTimeout(()=>{
      osc.stop();
      ctx.close();
    },250);

  }catch(e){}
}

function riskAlarm(){

  const now = Date.now();

  if(now - lastAlarm < 9000){
    return;
  }

  lastAlarm = now;

  beep(0.35);
}

// =======================
// HELPERS
// =======================

function avg(arr){

  if(!arr || !arr.length){
    return 0;
  }

  return arr.reduce((a,b)=>a+b,0)/arr.length;
}

function max(arr){

  if(!arr || !arr.length){
    return 0;
  }

  return Math.max(...arr);
}

function min(arr){

  if(!arr || !arr.length){
    return 0;
  }

  return Math.min(...arr);
}

// =======================
// RR
// =======================

function pushRR(tag,rr){

  if(!rr) return;

  rr = Number(rr);

  if(rr < 350 || rr > 1800){
    return;
  }

  if(!rrBuffers[tag]){
    rrBuffers[tag] = [];
  }

  if(lastRR[tag]){

    const delta =
    Math.abs(rr-lastRR[tag]);

    if(delta > 250){
      return;
    }
  }

  lastRR[tag] = rr;

  rrBuffers[tag].push(rr);

  if(rrBuffers[tag].length > MAX_RR){
    rrBuffers[tag].shift();
  }
}

// =======================
// BPM
// =======================

function pushBPM(tag,bpm){

  if(!bpm) return;

  bpm = Number(bpm);

  if(bpm < 30 || bpm > 220){
    return;
  }

  if(!bpmBuffers[tag]){
    bpmBuffers[tag] = [];
  }

  const last =
  bpmBuffers[tag][
    bpmBuffers[tag].length-1
  ];

  if(last){

    const delta =
    Math.abs(last-bpm);

    if(delta > 35){
      return;
    }
  }

  bpmBuffers[tag].push(bpm);

  if(bpmBuffers[tag].length > MAX_BPM){
    bpmBuffers[tag].shift();
  }
}

// =======================
// RMSSD
// =======================

function calcRMSSD(buffer){

  if(!buffer || buffer.length < 5){
    return null;
  }

  let sum = 0;

  for(let i=0;i<buffer.length-1;i++){

    const diff =
    buffer[i+1] - buffer[i];

    sum += diff*diff;
  }

  return Math.sqrt(
    sum/(buffer.length-1)
  );
}

// =======================
// STATUS
// =======================

function classify(session,rmssd){

  const tag = session.strap_tag;

  const bpm =
  avg(bpmBuffers[tag]) ||
  session.bpm ||
  0;

  const bpmPeak =
  max(bpmBuffers[tag]);

  const bpmMin =
  min(bpmBuffers[tag]);

  const bpmVariation =
  bpmPeak - bpmMin;

  const contact =
  session.contact === true;

  const rrBuffer =
  rrBuffers[tag] || [];

  const updatedAgo =
  Date.now() -
  new Date(session.updated_at).getTime();

  let level = "normal";

  let status = "ESTÁVEL";

  let stress = "NORMAL";

  let fatigue = "BAIXA";

  let recovery = "BOA";

  let alertText = "NORMAL";

  // =====================
  // SINAL
  // =====================

  if(!contact){

    return {

      level:"risk",

      status:"SEM CONTATO",

      stress:"SEM LEITURA",

      fatigue:"DESCONHECIDA",

      recovery:"SEM DADOS",

      alert:"CINTA DESCONECTADA",

      irregular:false,

      peak:false,

      immobile:false
    };
  }

  // =====================
  // SEM ATUALIZAÇÃO
  // =====================

  if(updatedAgo > 15000){

    return {

      level:"risk",

      status:"SEM TELEMETRIA",

      stress:"SEM DADOS",

      fatigue:"SEM DADOS",

      recovery:"SEM DADOS",

      alert:"DISPOSITIVO OFFLINE",

      irregular:false,

      peak:false,

      immobile:false
    };
  }

  // =====================
  // COLETANDO
  // =====================

  if(rrBuffer.length < 10 || rmssd === null){

    return {

      level:"warning",

      status:"COLETANDO",

      stress:"ANALISANDO",

      fatigue:"ANALISANDO",

      recovery:"ANALISANDO",

      alert:"COLETANDO DADOS",

      irregular:false,

      peak:false,

      immobile:false
    };
  }

  // =====================
  // PICO CARDÍACO
  // =====================

  let peak = false;

  if(bpm > 140){

    peak = true;
  }

  // =====================
  // IRREGULARIDADE
  // =====================

  let irregular = false;

  if(bpmVariation > 35){

    irregular = true;
  }

  // =====================
  // IMOBILIDADE
  // =====================

  let immobile = false;

  if(bpmVariation < 3){

    immobile = true;
  }

  // =====================
  // RISCO
  // =====================

  if(
    bpm > 135 &&
    rmssd < 10
  ){

    level = "risk";

    status = "RISCO FISIOLÓGICO";

    stress = "CRÍTICO";

    fatigue = "EXTREMA";

    recovery = "RUIM";

    alertText =
    "RETIRAR TRABALHADOR";

  }

  // =====================
  // ATENÇÃO
  // =====================

  else if(
    bpm > 110 ||
    rmssd < 18
  ){

    level = "warning";

    status = "SOB CARGA";

    stress = "ALTA";

    fatigue = "MODERADA";

    recovery = "ATENÇÃO";

    alertText =
    "MONITORAR";
  }

  // =====================
  // NORMAL
  // =====================

  else{

    level = "normal";

    status = "ESTÁVEL";

    stress = "NORMAL";

    fatigue = "BAIXA";

    recovery = "BOA";

    alertText = "NORMAL";
  }

  // =====================
  // FC BAIXA
  // =====================

  if(bpm < 45){

    level = "warning";

    status = "FC REDUZIDA";

    alertText =
    "VERIFICAR";
  }

  return {

    level,

    status,

    stress,

    fatigue,

    recovery,

    alert:alertText,

    irregular,

    peak,

    immobile,

    bpm:
    Math.round(bpm),

    bpmPeak,

    rmssd:
    Math.round(rmssd)
  };
}

// =======================
// STATUS VISUAL
// =======================

function statusClass(level){

  if(level === "risk"){
    return "risk";
  }

  if(level === "warning"){
    return "warning";
  }

  return "normal";
}

function ageText(updatedAt){

  if(!updatedAt){
    return "--";
  }

  const diff =
  Date.now() -
  new Date(updatedAt).getTime();

  if(diff < 3000){
    return "agora";
  }

  if(diff < 60000){
    return Math.round(diff/1000)+"s";
  }

  return Math.round(diff/60000)+"min";
}

// =======================
// GRAFICO
// =======================

function drawChart(tag,level){

  const data =
  bpmBuffers[tag] || [];

  if(data.length < 2){
    return "";
  }

  const w = 110;
  const h = 50;

  const minV =
  Math.min(...data)-2;

  const maxV =
  Math.max(...data)+2;

  const range =
  Math.max(maxV-minV,1);

  let color = "#22c55e";

  if(level === "warning"){
    color = "#facc15";
  }

  if(level === "risk"){
    color = "#ef4444";
  }

  const points = data.map((v,i)=>{

    const x =
    (i/(data.length-1))*w;

    const y =
    h - ((v-minV)/range)*h;

    return `${x.toFixed(1)},${y.toFixed(1)}`;

  }).join(" ");

  return `
    <svg viewBox="0 0 ${w} ${h}"
      width="${w}"
      height="${h}">

      <polyline
        points="${points}"
        fill="none"
        stroke="${color}"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  `;
}

// =======================
// RENDER
// =======================

function render(){

  const root =
  document.getElementById("cards");

  const list =
  Object.values(sessions)
  .filter(s=>s.active!==false);

  let normal = 0;
  let warning = 0;
  let risk = 0;

  if(list.length === 0){

    root.innerHTML =
    '<div class="empty">Nenhum trabalhador ativo.</div>';

    return;
  }

  root.innerHTML = list.map(s=>{

    pushRR(
      s.strap_tag,
      Number(s.rr_ms)
    );

    pushBPM(
      s.strap_tag,
      Number(s.bpm)
    );

    const rmssd =
    calcRMSSD(
      rrBuffers[s.strap_tag]
    );

    const state =
    classify(s,rmssd);

    if(state.level === "risk"){
      risk++;
      riskAlarm();
    }
    else if(state.level === "warning"){
      warning++;
    }
    else{
      normal++;
    }

    return `
    <div class="card ${state.level}">

      <div class="card-top">

        <div>

          <div class="worker">
            ${s.employee_name || "--"}
          </div>

          <div class="meta">
            Mat:
            ${s.employee_matricula || "--"}

            ·

            ${s.strap_tag || "--"}
          </div>

        </div>

        <div class="status-big ${state.level}">
          ${state.status}
        </div>

      </div>

      <div class="vital">

        <div>

          <div class="bpm ${state.level}">
            ${state.bpm}
          </div>

          <div class="bpm-label">
            BPM
          </div>

        </div>

        <div class="chart">
          ${drawChart(
            s.strap_tag,
            state.level
          )}
        </div>

      </div>

      <div class="section-title">
        DADOS FISIOLÓGICOS
      </div>

      <div class="metrics">

        <div class="metric">
          <div class="metric-label">
            RR
          </div>

          <div class="metric-value">
            ${s.rr_ms || "--"} ms
          </div>
        </div>

        <div class="metric">
          <div class="metric-label">
            RMSSD
          </div>

          <div class="metric-value">
            ${state.rmssd || "--"} ms
          </div>
        </div>

        <div class="metric">
          <div class="metric-label">
            Estresse
          </div>

          <div class="metric-value">
            ${state.stress}
          </div>
        </div>

        <div class="metric">
          <div class="metric-label">
            Fadiga
          </div>

          <div class="metric-value">
            ${state.fatigue}
          </div>
        </div>

        <div class="metric">
          <div class="metric-label">
            Recuperação
          </div>

          <div class="metric-value">
            ${state.recovery}
          </div>
        </div>

        <div class="metric">
          <div class="metric-label">
            Pico cardíaco
          </div>

          <div class="metric-value">
            ${state.peak ? "SIM" : "NÃO"}
          </div>
        </div>

        <div class="metric">
          <div class="metric-label">
            Ritmo irregular
          </div>

          <div class="metric-value">
            ${state.irregular ? "SIM" : "NÃO"}
          </div>
        </div>

        <div class="metric">
          <div class="metric-label">
            Imobilidade
          </div>

          <div class="metric-value">
            ${state.immobile ? "SIM" : "NÃO"}
          </div>
        </div>

        <div class="metric">
          <div class="metric-label">
            Contato
          </div>

          <div class="metric-value">
            ${s.contact
              ? '<span class="ok">OK</span>'
              : '<span class="bad">SEM CONTATO</span>'
            }
          </div>
        </div>

        <div class="metric">
          <div class="metric-label">
            Último pacote
          </div>

          <div class="metric-value">
            ${ageText(s.updated_at)}
          </div>
        </div>

      </div>

      <div class="alert-bar ${state.level}">
        ${state.alert}
      </div>

    </div>
    `;

  }).join("");

  document.getElementById("sumActive").innerText =
  list.length;

  document.getElementById("sumNormal").innerText =
  normal;

  document.getElementById("sumWarning").innerText =
  warning;

  document.getElementById("sumRisk").innerText =
  risk;
}

// =======================
// FETCH
// =======================

async function fetchSessions(){

  const {data,error} =
  await supabaseClient
    .from("current_sessions")
    .select("*")
    .eq("active",true)
    .order("employee_name");

  if(error){

    console.log(error);

    document.getElementById("status")
    .innerText =
    "erro";

    return;
  }

  sessions = {};

  for(const s of data){

    sessions[s.strap_tag] = s;
  }

  document.getElementById("status")
  .innerText =
  "online " +
  new Date().toLocaleTimeString();

  render();
}

// =======================
// REALTIME
// =======================

function startRealtime(){

  supabaseClient

  .channel("current_sessions_realtime")

  .on(
    "postgres_changes",

    {
      event:"*",
      schema:"public",
      table:"current_sessions"
    },

    payload=>{

      if(payload.eventType==="DELETE"){

        delete sessions[
          payload.old.strap_tag
        ];

      }else{

        const s = payload.new;

        if(s.active===false){

          delete sessions[s.strap_tag];

        }else{

          sessions[s.strap_tag]=s;
        }
      }

      render();
    }
  )

  .subscribe();
}

fetchSessions();

startRealtime();

setInterval(fetchSessions,3000);
setInterval(render,1000);

</script>

</body>
</html>
