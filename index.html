<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Painel Vital EPC13</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
    }

    header {
      background: #020617;
      padding: 18px 22px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 26px;
    }

    .sub {
      color: #94a3b8;
      margin-top: 5px;
      font-size: 14px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
    }

    button.off {
      background: #334155;
    }

    .container {
      padding: 18px;
      max-width: 1800px;
      margin: auto;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .summary-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 14px;
    }

    .summary-label {
      color: #94a3b8;
      font-size: 12px;
    }

    .summary-value {
      font-size: 28px;
      font-weight: bold;
      margin-top: 4px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
    }

    .card {
      position: relative;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.22);
      overflow: hidden;
    }

    .card.normal {
      border-color: #22c55e;
    }

    .card.warning {
      border-color: #facc15;
    }

    .card.risk {
      border-color: #ef4444;
      animation: pulseRisk 1s infinite;
    }

    @keyframes pulseRisk {
      0% { box-shadow: 0 0 0 rgba(239,68,68,0.2); }
      50% { box-shadow: 0 0 26px rgba(239,68,68,0.9); }
      100% { box-shadow: 0 0 0 rgba(239,68,68,0.2); }
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .name {
      font-size: 17px;
      font-weight: bold;
      line-height: 1.1;
    }

    .meta {
      color: #94a3b8;
      font-size: 12px;
      margin-top: 4px;
    }

    .status-dot {
      font-size: 22px;
      line-height: 1;
    }

    .bpm-row {
      display: flex;
      justify-content: space-between;
      align-items: end;
      margin-top: 10px;
    }

    .bpm {
      font-size: 52px;
      font-weight: bold;
      line-height: 1;
      color: #22c55e;
    }

    .bpm.warning {
      color: #facc15;
    }

    .bpm.risk {
      color: #ef4444;
    }

    .bpm-label {
      color: #94a3b8;
      font-size: 12px;
    }

    .mini-chart {
      width: 90px;
      height: 38px;
      background: #0f172a;
      border-radius: 10px;
      padding: 4px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .metric {
      background: #0f172a;
      border-radius: 12px;
      padding: 9px;
      min-height: 50px;
    }

    .metric-label {
      color: #94a3b8;
      font-size: 11px;
    }

    .metric-value {
      font-size: 14px;
      font-weight: bold;
      margin-top: 4px;
    }

    .ok { color: #22c55e; }
    .warn { color: #facc15; }
    .bad { color: #ef4444; }
    .blue { color: #38bdf8; }

    .empty {
      text-align: center;
      color: #94a3b8;
      padding: 60px;
      border: 1px dashed #334155;
      border-radius: 24px;
      grid-column: 1 / -1;
    }

    .footer {
      margin-top: 18px;
      color: #64748b;
      font-size: 13px;
    }
  </style>
</head>

<body>

<header>
  <div>
    <h1>Painel Vital em Tempo Real</h1>
    <div class="sub">
      Funcionários ativos · BPM · RMSSD · carga fisiológica · recuperação
    </div>
  </div>

  <div class="header-actions">
    <button id="soundBtn" onclick="toggleSound()">
      🔊 Ativar alerta sonoro
    </button>
  </div>
</header>

<div class="container">

  <div class="summary">
    <div class="summary-card">
      <div class="summary-label">Ativos</div>
      <div class="summary-value" id="sumActive">0</div>
    </div>

    <div class="summary-card">
      <div class="summary-label">Normal</div>
      <div class="summary-value ok" id="sumNormal">0</div>
    </div>

    <div class="summary-card">
      <div class="summary-label">Atenção</div>
      <div class="summary-value warn" id="sumWarning">0</div>
    </div>

    <div class="summary-card">
      <div class="summary-label">Risco</div>
      <div class="summary-value bad" id="sumRisk">0</div>
    </div>
  </div>

  <div id="cards" class="grid"></div>

  <div class="footer">
    Status: <span id="status">iniciando...</span>
  </div>
</div>

<script>

const SUPABASE_URL =
  "https://kxvbgpvdjbgbhbovnpyy.supabase.co";

const SUPABASE_KEY =
  "sb_publishable_yg8SSqYLolo0oWx_WZqsFA_5P4TBiAg";

const supabaseClient =
  supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let sessions = {};
let rrBuffers = {};
let bpmBuffers = {};
let lastRR = {};
let soundEnabled = false;
let lastAlarmAt = 0;

const MAX_RR = 60;
const MAX_BPM = 25;

// ==============================
// MÉDIA BPM
// ==============================

function avg(arr) {
  if (!arr || !arr.length) return 0;

  return arr.reduce((a, b) => a + b, 0) / arr.length;
}

// ==============================
// SOM
// ==============================

function toggleSound() {

  soundEnabled = !soundEnabled;

  const btn =
    document.getElementById("soundBtn");

  btn.innerText = soundEnabled
    ? "🔊 Alerta sonoro ligado"
    : "🔇 Alerta sonoro desligado";

  btn.className = soundEnabled ? "" : "off";

  if (soundEnabled) {
    beep(0.05);
  }
}

function beep(volume = 0.25) {

  if (!soundEnabled) return;

  try {

    const ctx =
      new (window.AudioContext ||
      window.webkitAudioContext)();

    const oscillator =
      ctx.createOscillator();

    const gain =
      ctx.createGain();

    oscillator.type = "sine";
    oscillator.frequency.value = 880;

    gain.gain.value = volume;

    oscillator.connect(gain);
    gain.connect(ctx.destination);

    oscillator.start();

    setTimeout(() => {
      oscillator.stop();
      ctx.close();
    }, 220);

  } catch (e) {
    console.log("Áudio bloqueado:", e);
  }
}

function alarmIfNeeded(hasRisk) {

  if (!hasRisk) return;

  const now = Date.now();

  if (now - lastAlarmAt > 10000) {
    lastAlarmAt = now;
    beep(0.35);
  }
}

// ==============================
// RR
// ==============================

function pushRR(tag, rr) {

  if (!rr) return;

  rr = Number(rr);

  if (rr < 350 || rr > 1800) {
    return;
  }

  if (!rrBuffers[tag]) {
    rrBuffers[tag] = [];
  }

  if (lastRR[tag]) {

    const delta =
      Math.abs(rr - lastRR[tag]);

    if (delta > 250) {
      return;
    }
  }

  lastRR[tag] = rr;

  rrBuffers[tag].push(rr);

  if (rrBuffers[tag].length > MAX_RR) {
    rrBuffers[tag].shift();
  }
}

// ==============================
// BPM
// ==============================

function pushBPM(tag, bpm) {

  if (!bpm) return;

  bpm = Number(bpm);

  if (bpm < 30 || bpm > 220) {
    return;
  }

  if (!bpmBuffers[tag]) {
    bpmBuffers[tag] = [];
  }

  const last =
    bpmBuffers[tag][bpmBuffers[tag].length - 1];

  if (last && Math.abs(last - bpm) > 35) {
    return;
  }

  bpmBuffers[tag].push(bpm);

  if (bpmBuffers[tag].length > MAX_BPM) {
    bpmBuffers[tag].shift();
  }
}

// ==============================
// RMSSD
// ==============================

function calcRMSSD(buffer) {

  if (!buffer || buffer.length < 5) {
    return null;
  }

  let sum = 0;

  for (let i = 0; i < buffer.length - 1; i++) {

    const diff =
      buffer[i + 1] - buffer[i];

    sum += diff * diff;
  }

  return Math.sqrt(sum / (buffer.length - 1));
}

// ==============================
// CLASSIFICAÇÃO
// ==============================

function classify(session, rmssd) {

  const bpm =
    avg(bpmBuffers[session.strap_tag]) ||
    session.bpm ||
    0;

  const contact =
    session.contact === true;

  const rrBuffer =
    rrBuffers[session.strap_tag] || [];

  let level = "normal";

  let stress = {
    text: "COLETANDO",
    cls: "warn"
  };

  let recovery = {
    text: "COLETANDO",
    cls: "warn"
  };

  let alert = {
    text: "NORMAL",
    cls: "ok"
  };

  // SEM CONTATO

  if (!contact || rrBuffer.length < 10) {

    return {

      level: "warning",

      stress: {
        text: "AGUARDANDO",
        cls: "warn"
      },

      recovery: {
        text: "AGUARDANDO",
        cls: "warn"
      },

      alert: {
        text: "SEM SINAL",
        cls: "warn"
      }
    };
  }

  // BAIXO RMSSD

  if (rmssd !== null) {

    if (rmssd < 12) {

      level = "risk";

      stress = {
        text: "ALTA",
        cls: "bad"
      };

      recovery = {
        text: "BAIXA",
        cls: "bad"
      };

    }

    else if (rmssd < 25) {

      level = "warning";

      stress = {
        text: "MODERADA",
        cls: "warn"
      };

      recovery = {
        text: "ATENÇÃO",
        cls: "warn"
      };

    }

    else {

      stress = {
        text: "NORMAL",
        cls: "ok"
      };

      recovery = {
        text: "BOA",
        cls: "ok"
      };
    }

    // SOBRECARGA

    if (bpm > 135 && rmssd < 20) {

      level = "risk";

      alert = {
        text: "RISCO OPERACIONAL",
        cls: "bad"
      };
    }

    else if (bpm > 115 && rmssd < 28) {

      if (level !== "risk") {
        level = "warning";
      }

      alert = {
        text: "ATENÇÃO",
        cls: "warn"
      };
    }

    else if (bpm < 45) {

      if (level !== "risk") {
        level = "warning";
      }

      alert = {
        text: "FC REDUZIDA",
        cls: "blue"
      };
    }

    else {

      alert = {
        text: "NORMAL",
        cls: "ok"
      };
    }
  }

  return {
    level,
    stress,
    recovery,
    alert
  };
}

// ==============================
// UI
// ==============================

function statusDot(level) {

  if (level === "risk") return "🔴";
  if (level === "warning") return "🟡";

  return "🟢";
}

function contactHTML(contact) {

  return contact
    ? '<span class="ok">COM CONTATO</span>'
    : '<span class="bad">SEM CONTATO</span>';
}

function ageText(updatedAt) {

  if (!updatedAt) return "--";

  const diff =
    Date.now() -
    new Date(updatedAt).getTime();

  if (diff < 3000) return "agora";

  if (diff < 60000) {
    return Math.round(diff / 1000) + "s";
  }

  return Math.round(diff / 60000) + "min";
}

function drawChart(tag) {

  const data =
    bpmBuffers[tag] || [];

  if (data.length < 2) return "";

  const w = 90;
  const h = 38;

  const min =
    Math.min(...data) - 2;

  const max =
    Math.max(...data) + 2;

  const range =
    Math.max(max - min, 1);

  let points = data.map((v, i) => {

    const x =
      (i / (data.length - 1)) * w;

    const y =
      h - ((v - min) / range) * h;

    return `${x.toFixed(1)},${y.toFixed(1)}`;

  }).join(" ");

  return `
    <svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">
      <polyline
        points="${points}"
        fill="none"
        stroke="#22c55e"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  `;
}

// ==============================
// RENDER
// ==============================

function render() {

  const list =
    Object.values(sessions)
    .filter(s => s.active !== false);

  const root =
    document.getElementById("cards");

  let normal = 0;
  let warning = 0;
  let risk = 0;
  let hasRisk = false;

  if (list.length === 0) {

    document.getElementById("sumActive").innerText = 0;
    document.getElementById("sumNormal").innerText = 0;
    document.getElementById("sumWarning").innerText = 0;
    document.getElementById("sumRisk").innerText = 0;

    root.innerHTML =
      '<div class="empty">Nenhum funcionário ativo.</div>';

    return;
  }

  root.innerHTML = list.map(s => {

    pushRR(s.strap_tag, Number(s.rr_ms));
    pushBPM(s.strap_tag, Number(s.bpm));

    const rrBuffer =
      rrBuffers[s.strap_tag] || [];

    const rmssd =
      calcRMSSD(rrBuffer);

    const state =
      classify(s, rmssd);

    if (state.level === "risk") {
      risk++;
      hasRisk = true;
    }

    else if (state.level === "warning") {
      warning++;
    }

    else {
      normal++;
    }

    return `
      <div class="card ${state.level}">

        <div class="top">

          <div>
            <div class="name">
              ${s.employee_name || "--"}
            </div>

            <div class="meta">
              Mat: ${s.employee_matricula || "--"}
              ·
              ${s.strap_tag || "--"}
            </div>
          </div>

          <div class="status-dot">
            ${statusDot(state.level)}
          </div>

        </div>

        <div class="bpm-row">

          <div>

            <div class="bpm ${state.level}">
              ${Math.round(avg(bpmBuffers[s.strap_tag])) || s.bpm || "--"}
            </div>

            <div class="bpm-label">
              BPM
            </div>

          </div>

          <div class="mini-chart">
            ${drawChart(s.strap_tag)}
          </div>

        </div>

        <div class="metrics">

          <div class="metric">
            <div class="metric-label">RR</div>

            <div class="metric-value">
              ${s.rr_ms ?? "--"} ms
            </div>
          </div>

          <div class="metric">
            <div class="metric-label">RMSSD</div>

            <div class="metric-value">
              ${rmssd === null ? "..." : rmssd.toFixed(0) + " ms"}
            </div>
          </div>

          <div class="metric">
            <div class="metric-label">
              Carga fisiológica
            </div>

            <div class="metric-value ${state.stress.cls}">
              ${state.stress.text}
            </div>
          </div>

          <div class="metric">
            <div class="metric-label">
              Recuperação
            </div>

            <div class="metric-value ${state.recovery.cls}">
              ${state.recovery.text}
            </div>
          </div>

          <div class="metric">
            <div class="metric-label">
              Contato
            </div>

            <div class="metric-value">
              ${contactHTML(s.contact)}
            </div>
          </div>

          <div class="metric">
            <div class="metric-label">
              Atualizado
            </div>

            <div class="metric-value">
              ${ageText(s.updated_at)}
            </div>
          </div>

        </div>

      </div>
    `;

  }).join("");

  document.getElementById("sumActive").innerText =
    list.length;

  document.getElementById("sumNormal").innerText =
    normal;

  document.getElementById("sumWarning").innerText =
    warning;

  document.getElementById("sumRisk").innerText =
    risk;

  alarmIfNeeded(hasRisk);
}

// ==============================
// SUPABASE
// ==============================

async function fetchSessions() {

  const { data, error } =
    await supabaseClient
      .from("current_sessions")
      .select("*")
      .eq("active", true)
      .order("employee_name", {
        ascending: true
      });

  if (error) {

    console.log(error);

    document.getElementById("status").innerText =
      "erro ao buscar dados";

    return;
  }

  sessions = {};

  for (const s of data) {
    sessions[s.strap_tag] = s;
  }

  document.getElementById("status").innerText =
    "online " +
    new Date().toLocaleTimeString();

  render();
}

function startRealtime() {

  supabaseClient
    .channel("current_sessions_realtime")

    .on(
      "postgres_changes",

      {
        event: "*",
        schema: "public",
        table: "current_sessions"
      },

      payload => {

        if (payload.eventType === "DELETE") {

          delete sessions[payload.old.strap_tag];

        } else {

          const s = payload.new;

          if (s.active === false) {

            delete sessions[s.strap_tag];

          } else {

            sessions[s.strap_tag] = s;
          }
        }

        document.getElementById("status").innerText =
          "tempo real " +
          new Date().toLocaleTimeString();

        render();
      }
    )

    .subscribe();
}

fetchSessions();
startRealtime();

setInterval(fetchSessions, 3000);
setInterval(render, 1000);

</script>

</body>
</html>
